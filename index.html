<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>D&D Переводчик</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root { --accent: #ff2a2a; }
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap');

    body {
        background: black;
        color: #ff2a2a;
        text-align: center;
        padding: 12px;
        font-family: Arial, sans-serif;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        margin: 0;
        min-height: 100vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        transition: background 1.2s ease-in-out;
    }
    .header { 
        position: absolute; top: 12px; left: 15px; z-index: 30; 
        color: #ddd; font-size: 13px; text-align: left; 
        background: rgba(0,0,0,0.75); padding: 6px 12px; 
        border: 1px solid #550000; border-radius: 4px; 
    }
    .header a { color: #ff2a2a; text-decoration: none; }
    .header a:hover { color: #ff8800; }

    h2 { 
        margin: 60px 0 20px 0; 
        font-size: 28px; 
        color: #ff4400; 
        text-shadow: 0 0 12px #ff0000; 
    }

    .buttons { 
        display: flex; flex-wrap: wrap; justify-content: center; 
        gap: 8px; margin: 15px 0 20px 0; 
    }
    button {
        padding: 10px 14px;
        background: black;
        color: #ff2a2a;
        border: 1px solid #ff2a2a;
        cursor: pointer;
        font-size: 15px;
        border-radius: 4px;
        transition: all 0.3s ease;
    }
    button:hover { background: #330000; box-shadow: 0 0 10px #ff4400; }

    .dropdown { position: relative; }
    .dropdown-content {
        display: none;
        position: absolute;
        background: rgba(0,0,0,0.95);
        border: 1px solid #ff2a2a;
        z-index: 20;
        min-width: 180px;
        border-radius: 4px;
        box-shadow: 0 0 12px #ff0000;
    }
    .dropdown-content button {
        width: 100%;
        border-bottom: 1px solid #440000;
        text-align: left;
        padding: 10px 14px;
        font-size: 15px;
    }
    .dropdown:hover .dropdown-content { display: block; }

    textarea {
        width: 92%; max-width: 760px; height: 110px;
        font-size: 17px; padding: 12px;
        background: rgba(0,0,0,0.85); color: #ff4444;
        border: 1px solid #660000; margin: 10px auto 15px;
        border-radius: 6px; resize: vertical;
    }

    .output {
        margin: 10px auto;
        width: 92%; max-width: 760px; min-height: 140px;
        overflow-y: auto; font-size: 26px; letter-spacing: 2px;
        text-align: left; padding: 16px;
        background: rgba(0,0,0,0.82);
        border: 1px solid #770000; border-radius: 6px;
        line-height: 1.45;
        text-shadow: 0 2px 12px #000;
        font-family: 'Noto Sans Symbols 2', Arial, sans-serif;
        direction: ltr !important;
        unicode-bidi: plaintext;
    }

    .info-box {
        margin: 12px auto;
        max-width: 760px;
        background: rgba(0,0,0,0.75);
        border: 1px solid #770000;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 14.5px;
        color: #ffffff;
        text-shadow: 0 0 8px #000;
        display: inline-block;
    }

    .reading {
        margin: 8px auto;
        font-size: 16.5px;
        color: #ffffff;
        text-shadow: 0 0 12px #000;
        max-width: 760px;
    }

    .controls { margin: 15px 0; }
    .controls button { margin: 0 6px; }

    .table {
        margin: 20px auto;
        display: grid;
        gap: 10px;
        max-width: 800px;
        background: rgba(20,0,0,0.45);
        padding: 16px;
        border: 1px solid #550000;
        border-radius: 8px;
        width: 92%;
    }
    .cell {
        height: 72px;
        border: 1px solid #555;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 12px;
        background: rgba(30,0,0,0.8);
        border-radius: 6px;
        transition: all 0.35s ease;
        cursor: pointer;
        text-align: center;
        line-height: 1.1;
        opacity: 0;
        transform: translateY(20px) scale(0.9);
    }
    .cell.visible { opacity: 1; transform: translateY(0) scale(1); }
    .cell:hover { transform: scale(1.08); box-shadow: 0 0 15px currentColor; }
    .cell span:first-child { font-size: 13.5px; opacity: 0.9; }
    .cell span.glyph {
        font-size: 26px;
        margin-top: 4px;
        font-family: 'Noto Sans Symbols 2', Arial, sans-serif;
    }

    /* ====================== ЦВЕТА И АНИМАЦИИ ====================== */
    .infernal .glyph, .output.infernal { color: #ff6600; text-shadow: 0 0 14px #ff3300; animation: infernalFlicker 2.2s infinite alternate; }
    .abyssal .glyph, .output.abyssal { color: #cc00ff; text-shadow: 0 0 16px #9900cc; animation: abyssalPulse 2.8s infinite; }
    .dwarf .glyph, .giant .glyph, .primordial .glyph,
    .output.dwarf, .output.giant, .output.primordial { color: #ffdd88; text-shadow: 0 0 12px #ccaa66; animation: stoneRumble 2.5s infinite linear; }
    .gnome .glyph, .output.gnome { color: #ff99ff; text-shadow: 0 0 14px #ff66cc; animation: gnomeSpark 2.4s infinite alternate; }
    .goblin .glyph, .output.goblin { color: #88ff88; text-shadow: 0 0 12px #44cc44; animation: goblinTwitch 1.8s infinite linear; }
    .orc .glyph, .output.orc { color: #ff5555; text-shadow: 0 0 14px #aa0000; animation: orcPulse 2.6s infinite; }
    .elf .glyph, .sylvan .glyph, .output.elf, .output.sylvan { color: #88ffcc; text-shadow: 0 0 14px #00ffaa; animation: elvenGlow 3s infinite alternate; }
    .drow .glyph, .output.drow { color: #ff88ff; text-shadow: 0 0 14px #cc00cc; animation: drowWhisper 2.7s infinite ease-in-out; }
    .dragon .glyph, .output.dragon { color: #ffdd44; text-shadow: 0 0 16px #ffaa00; animation: dragonScale 2.4s infinite alternate; }
    .celestial .glyph, .output.celestial { color: #aaffff; text-shadow: 0 0 14px #88eeff; animation: celestialTwinkle 2.5s infinite alternate; }
    .thief .glyph, .output.thief { color: #ffdd77; text-shadow: 0 0 14px #ccaa44; animation: thiefShadow 2.3s infinite alternate; }
    .deep .glyph, .output.deep { color: #44ccff; text-shadow: 0 0 14px #0088ff; animation: deepPulse 3s infinite; }

    @keyframes infernalFlicker { 0% { text-shadow: 0 0 10px #ff3300; } 100% { text-shadow: 0 0 25px #ff8800, 0 0 40px #ff0000; } }
    @keyframes abyssalPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.05); } }
    @keyframes stoneRumble { 0%,100% { transform: translateX(0); } 50% { transform: translateX(2px); } }
    @keyframes gnomeSpark { 0%,100% { text-shadow: 0 0 10px #ff88dd; } 50% { text-shadow: 0 0 22px #ff44bb; } }
    @keyframes goblinTwitch { 0%,100% { transform: translateX(0); } 33% { transform: translateX(3px); } 66% { transform: translateX(-3px); } }
    @keyframes orcPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes elvenGlow { 0%,100% { text-shadow: 0 0 12px #00ffaa; } 50% { text-shadow: 0 0 26px #00cc88; } }
    @keyframes drowWhisper { 0%,100% { opacity: 1; } 50% { opacity: 0.88; } }
    @keyframes dragonScale { 0%,100% { text-shadow: 0 0 14px #ffdd44; transform: scale(1); } 50% { text-shadow: 0 0 28px #ffaa00; transform: scale(1.06); } }
    @keyframes celestialTwinkle { 0%,100% { text-shadow: 0 0 12px #aaffff; } 50% { text-shadow: 0 0 26px #ddffff; } }
    @keyframes thiefShadow { 0%,100% { text-shadow: 0 0 12px #ccaa44; } 50% { text-shadow: 0 0 24px #ffdd77; } }
    @keyframes deepPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.9; } }

    .table.alphabet-normal { grid-template-columns: repeat(auto-fit, minmax(54px, 1fr)); }
    .table.alphabet-thief { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }

    @media (max-width: 640px) {
        .table { gap: 8px; padding: 12px; }
        .cell { height: 68px; }
        .cell span.glyph { font-size: 24px; }
        textarea { height: 95px; font-size: 16px; }
        .output { font-size: 23px; min-height: 130px; }
        h2 { font-size: 24px; margin-top: 50px; }
    }
</style>
</head>

    const drowSound = {а:"dha",б:"bha",в:"vha",г:"gha",д:"dha",е:"e",ё:"eo",ж:"zha",з:"za",и:"i",й:"yi",к:"kha",л:"lha",м:"mha",н:"nha",о:"o",п:"pha",р:"rha",с:"ssa",т:"tha",у:"u",ф:"fha",х:"kha",ц:"tsa",ч:"cha",ш:"ssha",щ:"sshae",ъ:"",ы:"y",ь:"",э:"e",ю:"yu",я:"yha"};
    const dragonSound = {а:"dra",б:"gra",в:"sva",г:"gar",д:"dar",е:"ess",ё:"ios",ж:"zha",з:"zar",и:"iss",й:"ir",к:"kar",л:"lar",м:"mar",н:"nar",о:"oss",п:"par",р:"rra",с:"sar",т:"tar",у:"ur",ф:"far",х:"khar",ц:"tsar",ч:"char",ш:"sshar",щ:"sshar",ъ:"",ы:"yr",ь:"",э:"er",ю:"sur",я:"ar"};
    const deepSound = {а:"glu",б:"blu",в:"vlu",г:"gru",д:"dlu",е:"eh",ё:"eoh",ж:"zhu",з:"zu",и:"ih",й:"yih",к:"klu",л:"llu",м:"mlu",н:"nlu",о:"oh",п:"plu",р:"rru",с:"slu",т:"tlu",у:"uh",ф:"flu",х:"khu",ц:"tslu",ч:"chlu",ш:"shlu",щ:"shlu",ъ:"",ы:"u",ь:"",э:"eh",ю:"ulu",я:"alu"};
    const celestialSound = {а:"ael",б:"bael",в:"vael",г:"gael",д:"dael",е:"el",ё:"eol",ж:"zhael",з:"zael",и:"iel",й:"yiel",к:"kael",л:"lael",м:"mael",н:"nael",о:"ol",п:"pael",р:"rael",с:"sael",т:"tael",у:"uel",ф:"fael",х:"hael",ц:"tsael",ч:"chael",ш:"shael",щ:"shael",ъ:"",ы:"yel",ь:"",э:"el",ю:"yuel",я:"yael"};

    function setMode(m) {
        const output = document.getElementById("output");
        const alphabet = document.getElementById("alphabet");
        output.style.opacity = "0";
        alphabet.style.opacity = "0";
        setTimeout(() => {
            mode = m;
            document.body.style.background = `url(${backgrounds[m]}) center/cover no-repeat fixed`;
            output.className = `output ${m}`;
            output.style.opacity = "1";
            buildAlphabet();
            convert();
            setTimeout(() => { alphabet.style.opacity = "1"; }, 200);
        }, 300);
    }

    function convert() {
        let input = document.getElementById("input").value.trim();
        if (mode === "thief") {
            let outputText = input;
            Object.keys(thiefDictionary).forEach(ru => {
                const regex = new RegExp("\\b" + ru + "\\b", "gi");
                const glyph = thiefWords.find(w => w.ru.toLowerCase() === ru).glyph;
                outputText = outputText.replace(regex, thiefDictionary[ru] + " " + glyph);
            });
            Object.keys(glyphToRu).forEach(glyph => {
                const regex = new RegExp("\\" + glyph.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), "g");
                outputText = outputText.replace(regex, glyphToRu[glyph]);
            });
            document.getElementById("output").innerText = outputText;
            document.getElementById("reading").innerText = "Воровской жаргон";
            document.getElementById("info").innerText = "Письменность: Воровские метки | Диалект: Воровской жаргон";
            return;
        }

        let glyphs = (mode === "elf" || mode === "sylvan" || mode === "drow") ? elfGlyphs :
                     (mode === "infernal" || mode === "abyssal") ? infernalGlyphs :
                     (mode === "dwarf" || mode === "giant" || mode === "gnome" || mode === "goblin" || mode === "orc" || mode === "primordial") ? dwarfGlyphs :
                     mode === "dragon" ? dragonGlyphs : celestialGlyphs;

        let sounds = mode === "infernal" ? infernalSound :
                     mode === "abyssal" ? abyssalSound :
                     mode === "dwarf" ? dwarfSound :
                     mode === "giant" ? giantSound :
                     mode === "gnome" ? gnomeSound :
                     mode === "goblin" ? goblinSound :
                     mode === "orc" ? orcSound :
                     mode === "primordial" ? primordialSound :
                     mode === "elf" ? elfSound :
                     mode === "sylvan" ? sylvanSound :
                     mode === "drow" ? drowSound :
                     mode === "dragon" ? dragonSound :
                     mode === "deep" ? deepSound : celestialSound;

        let reverseMap = (mode === "elf" || mode === "sylvan" || mode === "drow") ? elfReverse :
                         (mode === "infernal" || mode === "abyssal") ? infernalReverse :
                         (mode === "dwarf" || mode === "giant" || mode === "gnome" || mode === "goblin" || mode === "orc" || mode === "primordial") ? dwarfReverse :
                         mode === "dragon" ? dragonReverse : celestialReverse;

        let glyphText = "", read = "", russian = "";
        let isGlyphInput = false;

        for (let c of input) {
            if (c === " " || c === "\n") {
                glyphText += c; read += c; russian += c;
                continue;
            }
            let lower = c.toLowerCase();
            if (reverseMap[c]) {
                isGlyphInput = true;
                let r = reverseMap[c];
                russian += r;
                glyphText += c;
                read += sounds[r] || "";
            } else {
                russian += lower;
                glyphText += (mode === "deep" ? lower : (glyphs[lower] || lower));
                read += sounds[lower] || "";
            }
        }

        let words = read.split(/\s+/).filter(w => w).map(w => w.slice(0,6)).join(" ");

        document.getElementById("output").innerText = glyphText;
        document.getElementById("reading").innerText = isGlyphInput ? "Перевод на русский: " + russian : "Звучание: " + words;

        let infoText = "";
        if (mode === "infernal" || mode === "abyssal") infoText = "Письменность: Инфернальная | Диалект: " + (mode === "abyssal" ? "Бездна" : "Инфернальный");
        else if (["dwarf","giant","gnome","goblin","orc","primordial"].includes(mode)) {
            const names = {dwarf:"Дварфийский", giant:"Великаний", gnome:"Гномий", goblin:"Гоблинский", orc:"Орочий", primordial:"Первичный"};
            infoText = "Письменность: Дварфийская | Диалект: " + names[mode];
        } else if (["elf","sylvan","drow"].includes(mode)) {
            const names = {elf:"Эльфийский", sylvan:"Сильван", drow:"Подземный"};
            infoText = "Письменность: Эльфийская | Диалект: " + names[mode];
        } else if (mode === "deep") infoText = "Глубинная речь | Письменности нет";
        else if (mode === "celestial") infoText = "Письменность: Небесная";
        else if (mode === "dragon") infoText = "Письменность: Драконья | Диалект: Драконий";

        document.getElementById("info").innerHTML = infoText ? `<span>${infoText}</span>` : "";
    }

    function buildAlphabet() {
        let container = document.getElementById("alphabet");
        container.innerHTML = "";
        container.className = "table";

        if (mode === "deep") {
            container.innerHTML = '<p style="color:#666; font-size:18px; padding:40px; grid-column:1/-1;">У глубинной речи нет письменности</p>';
            return;
        }

        const isThief = mode === "thief";
        if (isThief) container.classList.add("alphabet-thief");
        else container.classList.add("alphabet-normal");

        const items = isThief ? thiefWords : Object.keys(
            (mode === "elf" || mode === "sylvan" || mode === "drow") ? elfGlyphs :
            (mode === "infernal" || mode === "abyssal") ? infernalGlyphs :
            (mode === "dwarf" || mode === "giant" || mode === "gnome" || mode === "goblin" || mode === "orc" || mode === "primordial") ? dwarfGlyphs :
            mode === "dragon" ? dragonGlyphs : celestialGlyphs
        );

        items.forEach((item, i) => {
            let cell = document.createElement("div");
            cell.className = `cell ${mode}`;
            cell.style.animationDelay = (i * 25) + "ms";

            if (isThief) {
                cell.innerHTML = `<b>${item.ru}</b><br>→ ${item.cant}<span class="glyph">${item.glyph}</span>`;
                cell.onclick = () => { document.getElementById("input").value += item.glyph + " "; convert(); };
            } else {
                const glyphsMap = (mode === "elf" || mode === "sylvan" || mode === "drow") ? elfGlyphs :
                                  (mode === "infernal" || mode === "abyssal") ? infernalGlyphs :
                                  (mode === "dwarf" || mode === "giant" || mode === "gnome" || mode === "goblin" || mode === "orc" || mode === "primordial") ? dwarfGlyphs :
                                  mode === "dragon" ? dragonGlyphs : celestialGlyphs;
                cell.innerHTML = `<span>${item.toUpperCase()}</span><span class="glyph">${glyphsMap[item]}</span>`;
                cell.onclick = () => { document.getElementById("input").value += glyphsMap[item]; convert(); };
            }
            container.appendChild(cell);
            setTimeout(() => cell.classList.add("visible"), 30);
        });
    }

    function copyText() {
        const text = document.getElementById("output").innerText;
        if (text) navigator.clipboard.writeText(text).then(() => alert("✅ Перевод скопирован!"));
    }

    function clearAll() {
        document.getElementById("input").value = "";
        document.getElementById("output").innerText = "";
        document.getElementById("reading").innerText = "";
        document.getElementById("info").innerHTML = "";
    }

    window.onload = () => setMode("infernal");
</script>
